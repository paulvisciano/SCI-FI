<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JARVIS Voice Recorder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a1128 0%, #1a1f3a 100%);
            color: #00ffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            height: 100vh;
            width: 100vw;
            overflow-x: hidden; /* Prevent horizontal scroll */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Network Device Dots (Background) */
        #network-dots-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden; /* Keep dots within viewport */
        }
        
        .network-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #00d9ff 0%, #00d9ff88 50%, transparent 80%);
            border: 2px solid #00d9ff;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            animation: pulse-dot 3s ease-in-out infinite;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff44;
            opacity: 0.8;
        }
        
        .network-dot:hover, .network-dot.selected {
            transform: scale(1.8);
            opacity: 1;
            z-index: 100;
            box-shadow: 0 0 20px #00d9ff, 0 0 40px #00d9ff88;
        }
        
        .network-dot.gateway {
            background: radial-gradient(circle, #00ff88 0%, #00ff8888 50%, transparent 80%);
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff8844;
        }
        
        .network-dot.gateway:hover, .network-dot.gateway.selected {
            box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff8888;
        }
        
        .network-dot.gateway {
            background: radial-gradient(circle, #00ff88 0%, transparent 70%);
        }
        
        .network-dot-tooltip {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 17, 40, 0.98);
            border: 2px solid #00d9ff;
            border-radius: 8px;
            padding: 14px;
            min-width: 220px;
            font-size: 12px;
            color: #00ffff;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }
        
        .network-dot:hover .network-dot-tooltip,
        .network-dot.selected .network-dot-tooltip {
            opacity: 1;
            pointer-events: auto;
        }
        
        .network-dot-tooltip h4 {
            margin: 0 0 6px 0;
            font-size: 11px;
            color: #00d9ff;
            text-transform: uppercase;
        }
        
        .network-dot-tooltip p {
            margin: 3px 0;
            color: #aabbcc;
        }
        
        .network-dot-tooltip .qr-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 8px;
            background: #00d9ff22;
            border: 1px solid #00d9ff;
            border-radius: 4px;
            color: #00d9ff;
            font-size: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .network-dot-tooltip .qr-btn:hover {
            background: #00d9ff33;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.95); }
        }
        
        /* QR Modal */
        .qr-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 17, 40, 0.9);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .qr-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 17, 40, 0.95);
            border: 1px solid #00d9ff;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            min-width: 300px;
        }
        .qr-content h3 {
            margin: 0 0 12px 0;
            color: #00ffff;
            font-size: 16px;
        }
        .qr-status {
            color: #aabbcc;
            font-size: 12px;
            margin: 0 0 12px 0;
        }
        .qr-close {
            margin-top: 12px;
            padding: 8px 16px;
            background: #00d9ff22;
            border: 1px solid #00d9ff;
            border-radius: 6px;
            color: #00d9ff;
            font-size: 12px;
            cursor: pointer;
        }
        .qr-close:hover {
            background: #00d9ff33;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 600px; /* Prevent layout shift */
        }

        h1.futuristic-title {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3);
            letter-spacing: 8px;
            font-weight: 200;
            background: linear-gradient(180deg, #00ffff 0%, #64ffda 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: title-glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes title-glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3); }
            to { text-shadow: 0 0 30px rgba(0, 255, 255, 0.8), 0 0 60px rgba(0, 255, 255, 0.5); }
        }

        .server-status {
            font-size: 0.8em;
            color: #64ffda;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .server-status .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse-green 2s ease-in-out infinite;
        }
        
        .server-status .indicator.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
            animation: pulse-red 2s ease-in-out infinite;
        }
        
        @keyframes pulse-green {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }
        
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .status {
            font-size: 0.9em;
            color: #64ffda;
            margin-bottom: 30px;
            min-height: 1.2em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        /* JARVIS Video ORB - Pure Neural Intelligence */
        .jarvis-orb-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 40px auto 20px;
            flex-shrink: 0; /* Don't compress */
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Remove mobile tap highlight */
            -webkit-touch-callout: none; /* Disable iOS callout menu */
            user-select: none; /* Prevent selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Futuristic glow ring around orb */
        .orb-glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.1);
            opacity: 0.6;
            transition: all 0.3s ease;
            pointer-events: none;
            animation: ring-pulse 3s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.1);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 0.8;
                box-shadow: 0 0 50px rgba(0, 255, 255, 0.5), inset 0 0 50px rgba(0, 255, 255, 0.2);
            }
        }

        .jarvis-orb-container:hover .orb-glow-ring {
            opacity: 1;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.6), inset 0 0 60px rgba(0, 255, 255, 0.3);
        }

        .jarvis-orb-container.recording .orb-glow-ring {
            border-color: rgba(255, 68, 68, 0.6);
            box-shadow: 0 0 60px rgba(255, 68, 68, 0.6), inset 0 0 60px rgba(255, 68, 68, 0.3);
            animation: ring-alert 1s ease-in-out infinite;
        }

        @keyframes ring-alert {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        @keyframes halo-pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.4;
            }
        }

        .jarvis-orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .jarvis-orb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .jarvis-orb:hover {
            transform: scale(1.08);
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.8), 0 0 120px rgba(0, 255, 255, 0.4);
        }

        .jarvis-orb.engaged {
            filter: brightness(1.4) contrast(1.1);
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.8), 0 0 160px rgba(0, 255, 255, 0.5);
            animation: orb-pulse 0.6s ease-in-out infinite;
        }

        .jarvis-orb.engaged video {
            animation: speed-up 0.3s ease;
        }

        @keyframes orb-pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 80px rgba(0, 255, 255, 0.8), 0 0 160px rgba(0, 255, 255, 0.5);
            }
            50% { 
                transform: scale(1.08);
                box-shadow: 0 0 120px rgba(0, 255, 255, 1), 0 0 200px rgba(0, 255, 255, 0.7);
            }
        }

        @keyframes speed-up {
            from { filter: brightness(1); }
            to { filter: brightness(1.4); }
        }

        /* Legacy record button (hidden by default, shown on mobile or if video fails) */
        #record-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #00ffff;
            background: rgba(0, 255, 255, 0.15);
            color: #00ffff;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            margin: 0 auto 30px;
            display: none; /* Hidden by default, ORB is primary */
        }

        #record-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        #record-btn.recording {
            background: rgba(255, 0, 0, 0.4);
            border-color: #ff4444;
            box-shadow: 0 0 50px rgba(255, 68, 68, 0.6);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Clean futuristic transcript */
        #transcript {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            min-height: 200px; /* Reserve space upfront - prevents layout shift */
            text-align: left;
            font-size: 0.95em;
            line-height: 1.8;
            display: block; /* Always visible, just empty when not recording */
            backdrop-filter: blur(5px);
            flex-shrink: 0; /* Don't compress */
            cursor: pointer; /* Click to show path */
            position: relative;
        }
        
        #transcript:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        #transcript-path {
            display: none; /* Hidden by default */
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75em;
            color: #00ff88;
            opacity: 0.9;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            word-break: break-all;
        }
        
        #transcript-path.visible {
            display: block;
            animation: fade-in 0.3s ease;
        }
        
        .path-icon {
            display: inline-block;
            margin-left: 8px;
            opacity: 0.5;
            font-size: 0.9em;
            cursor: pointer;
        }
        
        .path-icon:hover {
            opacity: 1;
        }

        #transcript.visible {
            display: block;
            animation: fade-in 0.4s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #transcript-path {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75em;
            color: #00ff88;
            opacity: 0.7;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        #transcript-text {
            font-size: 1em;
            color: #ffffff;
            line-height: 1.7;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .label {
            font-size: 0.7em;
            color: #64ffda;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .jarvis-response {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.15);
        }

        #response-text {
            font-size: 0.95em;
            line-height: 1.7;
            color: #00ff88;
            font-weight: 300;
        }

        #play-response-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        #play-response-btn:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="futuristic-title">J.A.R.V.I.S</h1>
        
        <!-- JARVIS Video ORB - Pure Neural Intelligence -->
        <div class="jarvis-orb-container" id="jarvis-orb" title="Click to engage JARVIS">
            <div class="jarvis-orb">
                <video id="jarvis-video" loop muted autoplay playsinline preload="auto">
                    <source src="jarvis-orb-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="orb-glow-ring"></div>
        </div>
        
        <div id="transcript">
            <div class="label" style="margin-bottom:8px; display: flex; align-items: center; justify-content: space-between;">
                <span>Live Transcription</span>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span id="transcript-time" style="font-size: 0.75em; color: #00ffff; opacity: 0.8; font-weight: 600;"></span>
                    <span class="path-icon" onclick="toggleTranscriptPath()" title="Show archive path">📁</span>
                </div>
            </div>
            <div id="transcript-text" style="max-height: 200px; overflow-y: auto; margin-bottom:15px;"></div>
            <div id="transcript-path" style="font-family: monospace; font-size: 0.75em; color: #00ff88; display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0, 255, 255, 0.2); word-break: break-all;"></div>
            <div class="jarvis-response" id="jarvis-response" style="display:none;">
                <div class="label" style="margin-top:15px;">Jarvis Response</div>
                <div id="response-text"></div>
                <button id="play-response-btn" style="margin-top:10px; padding:8px 16px; background:rgba(0,255,255,0.2); border:1px solid #00ffff; color:#00ffff; border-radius:6px; cursor:pointer;">🔊 Play Response</button>
            </div>
        </div>
    </div>
    
    <!-- Recording button + Server status at bottom, full width on mobile -->
    <div style="position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; padding: 0 20px; box-sizing: border-box;">
        <button id="record-btn" style="margin-bottom: 12px; padding: 12px 24px; background: rgba(0,255,255,0.2); border: 2px solid #00ffff; color: #00ffff; border-radius: 8px; font-size: 14px; cursor: pointer; letter-spacing: 2px;">REC</button>
        <div class="status" id="status" style="font-size: 0.8em; opacity: 0.8; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        <div class="server-status" id="server-status" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            <span class="indicator" id="server-indicator"></span>
            <span id="server-status-text">Checking server...</span>
            <span id="server-version" style="margin-left: 8px; font-size: 0.7em; opacity: 0.6;"></span>
        </div>
    </div>
    
    <script>
        function toggleTranscriptPath() {
            const pathEl = document.getElementById('transcript-path');
            if (pathEl.style.display === 'none' || pathEl.style.display === '') {
                pathEl.style.display = 'block';
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toTimeString().split(' ')[0].replace(/:/g, '');
                pathEl.textContent = `~/RAW/archive/${today}/audio/${today}-${time}-*.wav`;
                pathEl.title = `Full path: /Users/paulvisciano/RAW/archive/${today}/audio/`;
            } else {
                pathEl.style.display = 'none';
            }
        }
    </script>

    <script>
        // Global API base for all fetch calls
        const API_BASE = window.location.protocol + '//' + (window.location.host || 'localhost:3001');
        
        const recordBtn = document.getElementById('record-btn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const transcriptText = document.getElementById('transcript-text');
        const jarvisResponse = document.getElementById('jarvis-response');
        const responseText = document.getElementById('response-text');
        const jarvisOrb = document.getElementById('jarvis-orb');
        const jarvisOrbContainer = document.getElementById('jarvis-orb').parentElement;
        const jarvisVideo = document.getElementById('jarvis-video');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let isOrbEngaged = false;
        
        // Live streaming transcription
        let audioContext;
        let mediaStreamSource;
        let scriptProcessor;
        let streamingInterval;
        let lastTranscript = '';

        // Check if video loaded successfully, if not show fallback button
        jarvisVideo.addEventListener('error', () => {
            console.error('Video failed to load, showing fallback button');
            recordBtn.style.display = 'block';
            jarvisOrb.style.display = 'none';
        });

        jarvisVideo.addEventListener('loadeddata', () => {
            console.log('Video loaded successfully');
            // Video loaded, keep ORB visible
        });

        // Mouse enter/leave effects - make ORB feel alive
        jarvisOrb.addEventListener('mouseenter', () => {
            if (!isRecording) {
                // Anticipation effect - orb gets excited when you approach
                jarvisOrb.classList.add('engaged');
                jarvisVideo.playbackRate = 1.3;
            }
        });

        jarvisOrb.addEventListener('mouseleave', () => {
            if (!isRecording && !isOrbEngaged) {
                // Return to idle state
                jarvisOrb.classList.remove('engaged');
                jarvisVideo.playbackRate = 1.0;
            }
        });

        // ORB click handler - engage/disengage JARVIS
        jarvisOrb.addEventListener('click', () => {
            isOrbEngaged = !isOrbEngaged;
            
            if (isOrbEngaged) {
                jarvisOrb.classList.add('engaged');
                jarvisVideo.playbackRate = 1.5;
            } else {
                jarvisOrb.classList.remove('engaged');
                jarvisVideo.playbackRate = 1.0;
            }
        });

        // Check if browser supports MediaRecorder (mobile browsers may need HTTPS)
        const hasMediaDevices = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        if (!hasMediaDevices) {
            // Try to start recording anyway - some browsers support MediaRecorder but not getUserMedia check
            console.warn('MediaDevices check failed, but attempting recording anyway...');
        }

        // Record button still works (for keyboard shortcut or mobile)
        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            } else {
                await stopRecording();
            }
        });

        // Also allow ORB click to start/stop recording when not engaged
        jarvisOrb.addEventListener('dblclick', async (e) => {
            e.stopPropagation(); // Prevent engage toggle
            if (!isRecording) {
                await startRecording();
            } else {
                await stopRecording();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Use WebM - supported by all modern browsers (Chrome, Brave, Firefox, Safari)
                const options = { mimeType: 'audio/webm;codecs=opus' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    // Ultimate fallback
                    options.mimeType = 'audio/webm';
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                    // Streaming disabled - using OpenClaw batch processing instead
                };

                mediaRecorder.onstop = sendToServer;

                mediaRecorder.start(2000); // Request data every 2 seconds for streaming
                isRecording = true;
                
                // Update UI - make it ALIVE
                recordBtn.textContent = 'STOP';
                recordBtn.classList.add('recording');
                jarvisOrb.classList.add('engaged', 'recording'); // Auto-engage ORB + pulsating halo
                jarvisOrbContainer.classList.add('recording'); // Activate halo rings
                jarvisVideo.playbackRate = 2.0; // Speed up video during recording
                status.textContent = '🔴 Recording...';
                status.style.color = '#ff4444';
                status.style.textShadow = '0 0 30px rgba(255, 68, 68, 0.8)';
                status.style.opacity = '1';
                transcript.classList.add('visible');
                transcriptText.textContent = 'Listening...';
                jarvisResponse.style.display = 'none';
            } catch (err) {
                status.textContent = '❌ Microphone access denied';
                console.error('Mic error:', err);
            }
        }
        
        // Send audio chunk to server for live transcription
        // Streaming disabled - using OpenClaw batch processing instead

        async function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            
            recordBtn.textContent = 'REC';
            recordBtn.classList.remove('recording');
            jarvisOrb.classList.remove('engaged', 'recording'); // Remove all states
            jarvisOrbContainer.classList.remove('recording');
            jarvisVideo.playbackRate = 1.0;
            status.textContent = 'Uploading...';
            status.style.color = '#ffd700';
            status.style.textShadow = '0 0 30px rgba(255, 215, 0, 0.6)';
            status.style.opacity = '1';
        }

        async function sendToServer() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.ok) {
                    status.textContent = '✅ Uploaded! Processing...';
                    transcript.classList.add('visible');
                    
                    // Show archive path
                    const today = new Date().toISOString().split('T')[0];
                    const time = new Date().toTimeString().split(' ')[0].replace(/:/g, '');
                    const archivePath = `~/RAW/archive/${today}/audio/${today}-${time}-*.wav`;
                    document.getElementById('transcript-path').textContent = archivePath;
                    document.getElementById('transcript-path').title = `Full path: /Users/paulvisciano/RAW/archive/${today}/audio/`;
                    
                    // Show status
                    transcriptText.innerHTML = '<span style="color: #00ff88;">✅ ' + result.message + '</span>';
                    
                    // Poll for transcript (server handles conversation flow now)
                    pollForTranscript();
                } else {
                    status.textContent = '❌ Upload failed';
                    transcriptText.innerHTML = `<span style="color: #ff4444;">❌ Upload failed: ${result.message || 'Unknown error'}</span>`;
                }
            } catch (err) {
                // Server offline - save locally as fallback
                const downloadUrl = URL.createObjectURL(audioBlob);
                const timestamp = new Date().toISOString().replace(/[:.]/g, '').split('T')[0] + '-' + new Date().toTimeString().split(' ')[0].replace(/:/g, '');
                const filename = `recording-${timestamp}-OFFLINE.webm`;
                
                // Create download link
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(downloadUrl);
                
                status.textContent = `⚠️ Server offline. Saved as ${filename}`;
                status.style.color = '#ffd700';
                transcriptText.innerHTML = `<span style="color: #ffd700;">⚠️ Server was offline. Audio saved to Downloads folder.<br>Re-upload when server is back.</span>`;
                transcript.classList.add('visible');
                
                console.error('Upload failed - saved locally:', filename);
            }
        }

        // Poll for transcript status (single definition)
        async function pollForTranscript() {
            let attempts = 0;
            const maxAttempts = 30; // 30 seconds max
            
            const pollInterval = setInterval(async () => {
                attempts++;
                
                try {
                    const response = await fetch(`${API_BASE}/transcript/latest`);
                    if (response.ok) {
                        const data = await response.json();
                        
                        if (data.status === 'transcribing') {
                            transcriptText.innerHTML = '<span style="color: #ffd700;">⏳ Transcribing...</span>';
                            status.textContent = 'Processing...';
                        } else if (data.status === 'done' && data.transcript) {
                            clearInterval(pollInterval);
                            
                            // Show the actual transcript
                            transcriptText.textContent = data.transcript;
                            
                            // Update timestamp - when this message was recorded
                            const now = new Date();
                            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                            const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                            document.getElementById('transcript-time').textContent = `${dateStr} ${timeStr}`;
                            
                            status.textContent = '✅ Complete';
                            status.style.color = '#00ff88';
                            status.style.textShadow = '0 0 30px rgba(0, 255, 136, 0.6)';
                            status.style.opacity = '1';
                            
                            if (data.jarvisResponse) {
                                responseText.textContent = data.jarvisResponse;
                                jarvisResponse.style.display = 'block';
                                // Auto-play response using browser TTS
                                playResponse(data.jarvisResponse);
                            }
                        } else if (data.status === 'error') {
                            clearInterval(pollInterval);
                            transcriptText.innerHTML = '<span style="color: #ff4444;">❌ ' + data.error + '</span>';
                            if (data.errorDetails) {
                                transcriptText.innerHTML += '<br><span style="color: #ff8888; font-size: 0.85em;">' + data.errorDetails + '</span>';
                            }
                            status.textContent = '❌ Error';
                            status.style.color = '#ff4444';
                        } else if (data.status === 'idle') {
                            transcriptText.textContent = 'Waiting for input...';
                        }
                    }
                } catch (err) {
                    console.error('Poll error:', err);
                    if (attempts === 1) {
                        transcriptText.innerHTML = '<span style="color: #00ffff;">⏳ Processing...</span>';
                    }
                }
                
                if (attempts >= maxAttempts) {
                    clearInterval(pollInterval);
                    transcriptText.innerHTML = '<span style="color: #ff8800;">⏱️ Timeout - no transcript received</span>';
                    status.textContent = 'Timeout';
                }
            }, 1000); // Poll every second
        }

        // Keyboard shortcut (Space to record)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                recordBtn.click();
            }
        });

        // Text-to-Speech for Jarvis responses
        function playResponse(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                
                // Try to use a good English voice
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.name.includes('Google US English')) || 
                                      voices.find(v => v.lang === 'en-US') || 
                                      voices[0];
                if (preferredVoice) utterance.voice = preferredVoice;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // Server status checker - polls health endpoint every 5 seconds
        function checkServerStatus() {
            fetch(`${API_BASE}/health`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('server-indicator').classList.remove('offline');
                    document.getElementById('server-status-text').textContent = 'Server online';
                    document.getElementById('server-version').textContent = `v${data.version} (${data.build})`;
                })
                .catch(() => {
                    document.getElementById('server-indicator').classList.add('offline');
                    document.getElementById('server-status-text').textContent = 'Server offline';
                    document.getElementById('server-version').textContent = '';
                });
        }
        
        // Check on load, then every 5 seconds
        checkServerStatus();
        setInterval(checkServerStatus, 5000);

        // Manual play button
        document.getElementById('play-response-btn')?.addEventListener('click', () => {
            const responseText = document.getElementById('response-text').textContent;
            if (responseText) playResponse(responseText);
        });

        // === Network Dots Integration ===
        (function() {
            // Use actual host (not localhost) - works on phone when scanned via QR
            const protocol = window.location.protocol;
            const host = window.location.host || 'localhost:3001';
            const API_BASE = `${protocol}//${host}`;
            let devices = [];
            let dotElements = [];

            async function loadDevices() {
                try {
                    const res = await fetch(`${API_BASE}/network/devices`);
                    const data = await res.json();
                    if (data.error) return;
                    devices = data.devices || [];
                    renderDots();
                } catch (err) {
                    console.warn('Network fetch failed:', err);
                }
            }

            function renderDots() {
                const container = document.getElementById('network-dots-container');
                if (!container) return;
                container.innerHTML = '';
                dotElements = [];
                
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const ringRadius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
                
                devices.forEach((device, idx) => {
                    const angle = (idx / devices.length) * Math.PI * 2;
                    const x = centerX + Math.cos(angle) * ringRadius;
                    const y = centerY + Math.sin(angle) * ringRadius;
                    
                    const dot = document.createElement('div');
                    dot.className = `network-dot ${device.isGateway ? 'gateway' : ''}`;
                    dot.style.left = `${x - 8}px`;
                    dot.style.top = `${y - 8}px`;
                    dot.style.animationDelay = `${idx * 0.5}s`;
                    
                    const tooltip = document.createElement('div');
                    tooltip.className = 'network-dot-tooltip';
                    tooltip.innerHTML = `
                        <h4>${device.manufacturer}</h4>
                        <p>IP: ${device.ip}</p>
                        <p>MAC: ${device.mac.toUpperCase()}</p>
                        <p>Type: ${device.deviceType}</p>
                        <span class="qr-btn" data-ip="${device.ip}">📱 Show QR</span>
                    `;
                    
                    dot.appendChild(tooltip);
                    container.appendChild(dot);
                    dotElements.push(dot);
                    
                    // Click to keep tooltip visible
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        dotElements.forEach(d => d.classList.remove('selected'));
                        dot.classList.add('selected');
                    });
                    
                    // Close tooltips when clicking elsewhere
                    document.addEventListener('click', () => {
                        dotElements.forEach(d => d.classList.remove('selected'));
                    });
                    
                    const qrBtn = tooltip.querySelector('.qr-btn');
                    qrBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showQRCode(device.ip);
                    });
                });
            }

            function showQRCode(ip) {
                let modal = document.getElementById('qr-modal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'qr-modal';
                    modal.className = 'qr-modal';
                    modal.innerHTML = `
                        <div class="qr-content">
                            <h3>📱 Scan QR Code</h3>
                            <p class="qr-status">Generating...</p>
                            <img class="qr-image" src="" alt="QR Code" style="display:none; width:200px; height:200px; margin:1rem auto; border:2px solid #00d9ff; border-radius:8px;" />
                            <p class="qr-url" style="font-family:monospace; color:#00d9ff; margin-top:0.5rem;"></p>
                            <button class="qr-close" onclick="document.getElementById('qr-modal').style.display='none'">Close</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                }
                
                modal.style.display = 'block';
                modal.querySelector('.qr-status').textContent = 'Generating...';
                modal.querySelector('.qr-image').style.display = 'none';
                
                fetch(`${API_BASE}/network/qr`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            modal.querySelector('.qr-status').textContent = 'Failed to generate';
                            return;
                        }
                        modal.querySelector('.qr-status').textContent = `Scan to connect to ${ip}:3001`;
                        modal.querySelector('.qr-image').src = data.qr;
                        modal.querySelector('.qr-image').style.display = 'block';
                        modal.querySelector('.qr-url').textContent = data.url;
                    })
                    .catch(() => {
                        modal.querySelector('.qr-status').textContent = 'Generation failed';
                    });
            }

            window.addEventListener('resize', renderDots);
            loadDevices();
            setInterval(loadDevices, 30000);
        })();
    </script>
    
    <!-- Network Dots Container -->
    <div id="network-dots-container"></div>
</body>
</html>

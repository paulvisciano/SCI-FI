<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JARVIS Voice Recorder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000000;
            color: #00ffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No scroll - fixed viewport */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            padding: 20px;
        }

        /* Network Device Dots (Background) */
        #network-dots-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden; /* Keep dots within viewport */
        }
        
        .network-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #00d9ff 0%, #00d9ff88 50%, transparent 80%);
            border: 2px solid #00d9ff;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            animation: pulse-dot 3s ease-in-out infinite;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff44;
            opacity: 0.8;
        }
        
        .network-dot:hover, .network-dot.selected {
            transform: scale(1.8);
            opacity: 1;
            z-index: 100;
            box-shadow: 0 0 20px #00d9ff, 0 0 40px #00d9ff88;
        }
        
        .network-dot.gateway {
            background: radial-gradient(circle, #00ff88 0%, #00ff8888 50%, transparent 80%);
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff8844;
        }
        
        .network-dot.gateway:hover, .network-dot.gateway.selected {
            box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff8888;
        }
        
        .network-dot.gateway {
            background: radial-gradient(circle, #00ff88 0%, transparent 70%);
        }
        
        .network-dot-tooltip {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 17, 40, 0.98);
            border: 2px solid #00d9ff;
            border-radius: 8px;
            padding: 14px;
            min-width: 220px;
            font-size: 12px;
            color: #00ffff;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }
        
        .network-dot:hover .network-dot-tooltip,
        .network-dot.selected .network-dot-tooltip {
            opacity: 1;
            pointer-events: auto;
        }
        
        .network-dot-tooltip h4 {
            margin: 0 0 6px 0;
            font-size: 11px;
            color: #00d9ff;
            text-transform: uppercase;
        }
        
        .network-dot-tooltip p {
            margin: 3px 0;
            color: #aabbcc;
        }
        
        .network-dot-tooltip .qr-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 8px;
            background: #00d9ff22;
            border: 1px solid #00d9ff;
            border-radius: 4px;
            color: #00d9ff;
            font-size: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .network-dot-tooltip .qr-btn:hover {
            background: #00d9ff33;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.95); }
        }
        
        /* QR Modal */
        .qr-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 17, 40, 0.9);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .qr-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 17, 40, 0.95);
            border: 1px solid #00d9ff;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            min-width: 300px;
        }
        .qr-content h3 {
            margin: 0 0 12px 0;
            color: #00ffff;
            font-size: 16px;
        }
        .qr-status {
            color: #aabbcc;
            font-size: 12px;
            margin: 0 0 12px 0;
        }
        .qr-close {
            margin-top: 12px;
            padding: 8px 16px;
            background: #00d9ff22;
            border: 1px solid #00d9ff;
            border-radius: 6px;
            color: #00d9ff;
            font-size: 12px;
            cursor: pointer;
        }
        .qr-close:hover {
            background: #00d9ff33;
        }

        /* Removed duplicate .container - using first definition at line 23 */

        h1.futuristic-title {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3);
            letter-spacing: 8px;
            font-weight: 200;
            background: linear-gradient(180deg, #00ffff 0%, #64ffda 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: title-glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes title-glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(0, 255, 255, 0.3); }
            to { text-shadow: 0 0 30px rgba(0, 255, 255, 0.8), 0 0 60px rgba(0, 255, 255, 0.5); }
        }

        .server-status {
            font-size: 0.8em;
            color: #64ffda;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.4s ease;
        }
        
        /* Fade out (applied by JS after 3 seconds) */
        .server-status.faded {
            opacity: 0.15;
        }
        
        /* Fade in on hover over status itself */
        .server-status:hover {
            opacity: 1;
        }
        
        .server-status .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse-green 2s ease-in-out infinite;
        }
        
        .server-status .indicator.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
            animation: pulse-red 2s ease-in-out infinite;
        }
        
        @keyframes pulse-green {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }
        
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .status {
            font-size: 0.9em;
            color: #64ffda;
            margin-bottom: 30px;
            min-height: 1.2em;
            letter-spacing: 3px;
        }
        
        /* Recording hint - shows on orb hover */
        .recording-hint {
            font-size: 0.7em;
            color: #00ffff;
            opacity: 0.6;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-align: center;
            transition: opacity 0.2s;
        }
        
        .jarvis-orb-container:hover + .status + .recording-hint,
        .recording-hint:hover {
            opacity: 1;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        /* JARVIS Video ORB - Pure Neural Intelligence */
        /* JARVIS Orb - Minimal styling, just circular mask */
        .jarvis-orb-container {
            position: relative;
            width: 242px; /* 10% larger (was 220px) */
            height: 242px;
            margin: 40px auto 20px;
            flex-shrink: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .jarvis-orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0, 255, 255, 0.15); /* Ultra-subtle border - barely visible */
        }

        .jarvis-orb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* No filters, no animations - pure video */
        }

        /* Subtle hover glow - minimal, doesn't affect video playback */
        .jarvis-orb-container:hover .jarvis-orb {
            border-color: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
        }

        /* Tap feedback - subtle glow (no scale, no flash, keeps video smooth) */
        .jarvis-orb-container:active .jarvis-orb, .jarvis-orb-container.tapped .jarvis-orb {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.25);
        }
        
        /* Recording state - subtle red glow (minimal, performance-safe) */
        .jarvis-orb.recording {
            border-color: rgba(255, 68, 68, 0.4);
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.2);
            animation: orb-record-pulse 3s ease-in-out infinite;
        }
        
        @keyframes orb-record-pulse {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(255, 68, 68, 0.2);
            }
            50% { 
                box-shadow: 0 0 45px rgba(255, 68, 68, 0.3);
            }
        }
        
        /* Minimal engaged state - no filters, no slowdowns */
        .jarvis-orb.engaged {
            /* Empty - pure video, no effects */
        }

        /* Version badge - static, no effects */
        .orb-version-badge {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: #00ffff;
            opacity: 0.7;
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes orb-pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 80px rgba(0, 255, 255, 0.8), 0 0 160px rgba(0, 255, 255, 0.5);
            }
            50% { 
                transform: scale(1.08);
                box-shadow: 0 0 120px rgba(0, 255, 255, 1), 0 0 200px rgba(0, 255, 255, 0.7);
            }
        }

        /* Clean futuristic transcript - fixed height; content scrolls if long */
        #transcript {
            background: linear-gradient(135deg, #0a1128 0%, #1a1f3a 100%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            width: min(640px, calc(100vw - 40px));
            height: clamp(200px, 42vh, 420px);
            overflow-y: auto;
            text-align: left;
            font-size: 0.95em;
            line-height: 1.8;
            display: block;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease, width 0.3s ease, height 0.3s ease, position 0.3s ease, z-index 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }
        
        #transcript.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        #transcript:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }
        
        /* Fullscreen/Expand mode - occupies full page for reading large transcripts */
        #transcript.fullscreen {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 100px;
            width: calc(100vw - 40px);
            height: calc(100vh - 120px);
            z-index: 1000;
            border-color: rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            transform: none;
        }
        
        /* Expand button in transcript header */
        .transcript-expand-btn {
            display: inline-block;
            margin-left: 12px;
            padding: 4px 12px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            color: #00ffff;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.8;
        }
        
        .transcript-expand-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.6);
            opacity: 1;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        .transcript-expand-btn.expanded {
            background: rgba(0, 255, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.8);
        }
        
        #transcript-path {
            display: none; /* Hidden by default */
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75em;
            color: #00ff88;
            opacity: 0.9;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            word-break: break-all;
        }
        
        #transcript-path.visible {
            display: block;
            animation: fade-in 0.3s ease;
        }
        
        .path-icon {
            display: inline-block;
            margin-left: 8px;
            opacity: 0.5;
            font-size: 0.9em;
            cursor: pointer;
        }
        
        .path-icon:hover {
            opacity: 1;
        }

        #transcript.visible {
            display: block;
            animation: fade-in 0.4s ease;
        }

        #transcript.pulsate {
            animation: transcript-pulsate 1.5s ease-in-out infinite;
        }

        @keyframes transcript-pulsate {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.25); border-color: rgba(0, 255, 255, 0.3); }
            50% { box-shadow: 0 0 24px 4px rgba(0, 255, 255, 0.2); border-color: rgba(0, 255, 255, 0.6); }
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #transcript-path {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75em;
            color: #00ff88;
            opacity: 0.7;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        #transcript-text {
            font-size: 1em;
            color: #ffffff;
            line-height: 1.7;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .label {
            font-size: 0.7em;
            color: #64ffda;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        /* Sticky transcript header - clean minimal */
        .transcript-header {
            position: sticky;
            top: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
            background: rgba(10, 17, 40, 0.98); /* Solid background, not transparent */
            backdrop-filter: blur(5px);
        }
        
        #transcript.fullscreen .transcript-header {
            background: rgba(10, 17, 40, 0.98);
            backdrop-filter: blur(10px);
        }

        .jarvis-response {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.15);
        }

        #response-text {
            font-size: 0.95em;
            line-height: 1.7;
            color: #00ff88;
            font-weight: 300;
        }
        #response-text strong {
            color: #64ffda;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Orb centered vertically -->
    <div class="container">
        <!-- Title with client version inline (top right) -->
        <div class="title-container" style="display: flex; align-items: baseline; justify-content: center; gap: 8px; margin-bottom: 8px;">
            <h1 class="futuristic-title" style="margin: 0; font-size: 3.1em;">J.A.R.V.I.S</h1>
            <span id="client-version-inline" style="font-size: 0.75em; color: #64ffda; opacity: 0.7;">v2.9.10</span>
        </div>
        
        <!-- Server status under title (all server info) -->
        <div class="server-status" id="server-status" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.8em; opacity: 1; margin-bottom: 20px; transition: opacity 0.4s ease;">
            <span class="indicator" id="server-indicator" style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00ffff; box-shadow: 0 0 8px #00ffff; margin-right: 8px;"></span>
            <span id="server-status-text" style="color: #00ffff;">Server: v? • PID ? • ?</span>
        </div>
        
        <!-- JARVIS Video ORB -->
        <div class="jarvis-orb-container" id="jarvis-orb" title="JARVIS — Double-click or press Space to record">
            <div class="jarvis-orb">
                <video id="jarvis-video" loop muted autoplay playsinline preload="auto">
                    <source src="assets/jarvis-orb-video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="orb-glow-ring"></div>
        </div>
        
        <!-- Recording status under orb -->
        <div class="status" id="status" style="font-size: 0.8em; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 20px; margin-bottom: 8px;"></div>
        
        <!-- Recording hint under status -->
        <div class="recording-hint" id="recording-hint" style="font-size: 0.7em; opacity: 0.6; color: #00ffff; margin-bottom: 12px;">Double-click orb or press Space to record</div>
    </div>
    
    <!-- Transcript panel OUTSIDE container (bottom of page, doesn't affect centering) -->
    <div id="transcript" style="margin: 0 20px 80px 20px; width: min(640px, calc(100vw - 40px));">
        <div class="label transcript-header">
            <span>Live Transcription</span>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="transcript-time" style="font-size: 1.05em; color: #00ffff; opacity: 0.95; font-weight: 700;"></span>
                <span class="path-icon" onclick="toggleTranscriptPath()" title="Show archive path">📁</span>
                <button class="transcript-expand-btn" onclick="toggleTranscriptFullscreen()" title="Expand to fullscreen">⛶ Expand</button>
            </div>
        </div>
        <div id="transcript-text" style="margin-bottom:15px;"></div>
        <div id="transcript-path" style="font-family: monospace; font-size: 0.75em; color: #00ff88; display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0, 255, 255, 0.2); word-break: break-all;"></div>
        <div class="jarvis-response" id="jarvis-response" style="display:none;">
            <div class="label" style="margin-top:15px;">Jarvis Response</div>
            <div id="response-text"></div>
        </div>
    </div>
    
    <div id="network-dots-container"></div>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Neuro Graph — Dual View (JARVIS + User)</title>
    <link rel="stylesheet" href="./shared/neural-graph.css">
    <style>
        /* Dual-Graph Layout */
        :root {
            --jarvis-color: #00ffff;
            --user-color: #f87171;
            --divider-width: 4px;
            --divider-color: rgba(0, 255, 255, 0.3);
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #0a0a0a;
        }
        
        /* Main dual-container */
        .dual-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        /* Left panel: JARVIS graph */
        .graph-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .graph-panel.jarvis {
            border-right: var(--divider-width) solid var(--divider-color);
        }
        
        .graph-panel.user {
            border-left: var(--divider-width) solid var(--divider-color);
        }
        
        /* Canvas for each panel */
        .graph-panel canvas {
            flex: 1;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Info panel (overlay) */
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            z-index: 100;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .info-panel h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #00ffff;
        }
        
        .info-panel.jarvis h3 {
            color: var(--jarvis-color);
        }
        
        .info-panel.user h3 {
            color: var(--user-color);
        }
        
        .graph-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 4px;
            font-size: 11px;
            color: #00ffff;
            z-index: 50;
            pointer-events: none;
        }
        
        .graph-panel.user .graph-label {
            color: var(--user-color);
        }
        
        /* Sync button */
        .sync-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .sync-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #00ffff, #f87171);
            border: none;
            border-radius: 25px;
            color: #0a0a0a;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .sync-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .sync-btn:active {
            transform: scale(0.95);
        }
        
        /* Filter controls */
        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: #94a3b8;
            cursor: pointer;
        }
        
        .filter-btn:hover {
            color: #00ffff;
            border-color: rgba(0, 255, 255, 0.5);
        }
        
        .filter-btn.active {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border-color: #00ffff;
        }
        
        /* Search input */
        .search-input {
            width: 100%;
            padding: 6px 10px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: #00ffff;
            margin-bottom: 8px;
        }
        
        .search-input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }
        
        /* Stats display */
        .stats-row {
            display: flex;
            gap: 10px;
            font-size: 10px;
            margin-top: 8px;
        }
        
        .stat-item {
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }
        
        .stat-value {
            color: #00ffff;
            font-weight: bold;
        }
        
        .graph-panel.user .stat-value {
            color: var(--user-color);
        }
        
        /* Collapsed state */
        .info-panel.collapsed {
            max-height: 50px;
            overflow: hidden;
        }
        
        .info-panel.collapsed .collapsible-body {
            display: none;
        }
        
        /* Collapsible body hidden state */
        .collapsible-body.closed {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
        }
        
        .info-panel:not(.collapsed) {
            max-height: 500px;
        }
        
        .collapsible-body.open {
            max-height: 400px;
            opacity: 1;
        }
        
        /* Toggle button */
        .panel-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            color: #00ffff;
            cursor: pointer;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .graph-panel.user .panel-toggle {
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--user-color);
        }
        
        /* Responsive: stack on mobile */
        @media (max-width: 768px) {
            .dual-container {
                flex-direction: column;
            }
            
            .graph-panel {
                height: 50vh;
                border-right: none;
                border-bottom: var(--divider-width) solid var(--divider-color);
            }
            
            .graph-panel.user {
                border-left: none;
                border-top: var(--divider-width) solid var(--divider-color);
            }
            
            .sync-bar {
                bottom: 10px;
            }
        }
        
        /* Loading state */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 255, 0.3);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="dual-container">
        <!-- Left Panel: JARVIS Graph -->
        <div class="graph-panel jarvis" id="jarvis-panel">
            <canvas id="jarvis-canvas"></canvas>
            <div class="graph-label">🧠 JARVIS Memory Graph</div>
            
            <div class="info-panel collapsed" id="jarvis-info">
                <h3>⚡ JARVIS Neuro Graph</h3>
                <p class="tagline" style="font-size: 10px; color: #94a3b8;">Technical learnings, foundations, capabilities</p>
                
                <div class="filter-section">
                    <button type="button" class="collapsible-trigger" id="jarvis-filters-toggle" aria-expanded="false">
                        <span>Filters</span>
                        <span id="jarvis-filters-chevron">▲</span>
                    </button>
                    <div id="jarvis-filters-body" class="collapsible-body closed">
                        <div class="filter-row" id="jarvis-filter-types">
                            <!-- Populated by JS -->
                        </div>
                        <div class="filter-row" style="margin-top: 6px;">
                            <button class="filter-btn active" data-range="today">Today</button>
                            <button class="filter-btn" data-range="week">This Week</button>
                            <button class="filter-btn" data-range="month">This Month</button>
                            <button class="filter-btn" data-range="all">All Time</button>
                        </div>
                        <input type="search" class="search-input" id="jarvis-search" placeholder="Search JARVIS nodes..." style="margin-top: 8px;">
                        <div class="stats-row" style="margin-top: 8px;">
                            <span class="stat-item">Nodes: <span class="stat-value" id="jarvis-node-count">0</span></span>
                            <span class="stat-item">Synapses: <span class="stat-value" id="jarvis-synapse-count">0</span></span>
                        </div>
                        <div class="panel-buttons" style="margin-top: 8px;">
                            <button class="filter-btn" onclick="jarvisGraph.clearSelection()">✕ Clear</button>
                            <button class="filter-btn" onclick="jarvisGraph.randomPulse()">⚡ Pulse</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="button" class="panel-toggle" id="jarvis-toggle" aria-label="Toggle panel">›</button>
            <div class="loading-overlay" id="jarvis-loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
        
        <!-- Right Panel: User Graph -->
        <div class="graph-panel user" id="user-panel">
            <canvas id="user-canvas"></canvas>
            <div class="graph-label">👤 User Life Graph</div>
            
            <div class="info-panel collapsed" id="user-info">
                <h3>🌟 User Neuro Graph</h3>
                <p class="tagline" style="font-size: 10px; color: #94a3b8;">Life, relationships, context, experiences</p>
                
                <div class="filter-section">
                    <button type="button" class="collapsible-trigger" id="user-filters-toggle" aria-expanded="false">
                        <span>Filters</span>
                        <span id="user-filters-chevron">▲</span>
                    </button>
                    <div id="user-filters-body" class="collapsible-body closed">
                        <div class="filter-row" id="user-filter-types">
                            <!-- Populated by JS -->
                        </div>
                        <div class="filter-row" style="margin-top: 6px;">
                            <button class="filter-btn active" data-range="today">Today</button>
                            <button class="filter-btn" data-range="week">This Week</button>
                            <button class="filter-btn" data-range="month">This Month</button>
                            <button class="filter-btn" data-range="all">All Time</button>
                        </div>
                        <input type="search" class="search-input" id="user-search" placeholder="Search user nodes..." style="margin-top: 8px;">
                        <div class="stats-row" style="margin-top: 8px;">
                            <span class="stat-item">Nodes: <span class="stat-value" id="user-node-count">0</span></span>
                            <span class="stat-item">Synapses: <span class="stat-value" id="user-synapse-count">0</span></span>
                        </div>
                        <div class="panel-buttons" style="margin-top: 8px;">
                            <button class="filter-btn" onclick="userGraph.clearSelection()">✕ Clear</button>
                            <button class="filter-btn" onclick="userGraph.randomPulse()">⚡ Pulse</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="button" class="panel-toggle" id="user-toggle" aria-label="Toggle panel">›</button>
            <div class="loading-overlay" id="user-loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
    
    <!-- Sync Bar (centered at bottom) -->
    <div class="sync-bar">
        <button class="sync-btn" id="sync-breathe-btn">🫁 Breathe Now</button>
        <button class="filter-btn" id="sync-zoom-in">🔍 +</button>
        <button class="filter-btn" id="sync-zoom-out">🔍 −</button>
    </div>
    
    <!-- Share Modal (reused from single view) -->
    <div id="share-modal-overlay" class="share-modal-overlay" aria-hidden="true" style="display: none;">
        <div class="share-modal" role="dialog" aria-labelledby="share-modal-title">
            <h3 id="share-modal-title">Share Neuro Graph</h3>
            <div class="share-preview" id="share-preview"></div>
            <div class="share-actions">
                <button type="button" class="btn-copy" id="share-modal-copy">Copy</button>
                <button type="button" class="btn-share" id="share-modal-native">Share…</button>
                <button type="button" class="btn-close" id="share-modal-close">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="./shared/GraphViewer.js"></script>
    <script src="./shared/dual-neuro-graph-v2.js"></script>
    
    <script>
        // Initialize dual graphs on DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Dual-index.html loaded');
        });
    </script>
</body>
</html>
>
